<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" fill="none">
  <!-- Why ScopeHR - Team & Expertise Illustration -->
  <!-- Background circle -->
  <circle cx="250" cy="225" r="180" fill="#2563EB" opacity="0.03"/>
  
  <!-- Shield / Trust symbol -->
  <path d="M250 60 L320 95 L320 175 C320 230 290 270 250 290 C210 270 180 230 180 175 L180 95 Z" fill="#2563EB" opacity="0.08" stroke="#2563EB" stroke-opacity="0.15" stroke-width="2"/>
  <path d="M230 180 L245 195 L275 155" stroke="#2563EB" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Person 1 - left -->
  <circle cx="120" cy="200" r="22" fill="#2563EB" opacity="0.15"/>
  <rect x="107" y="225" width="26" height="55" rx="8" fill="#2563EB" opacity="0.12"/>
  <!-- Hardhat -->
  <rect x="109" y="183" width="22" height="7" rx="3" fill="#F59E0B" opacity="0.35"/>
  
  <!-- Person 2 - right -->
  <circle cx="380" cy="200" r="22" fill="#0891B2" opacity="0.15"/>
  <rect x="367" y="225" width="26" height="55" rx="8" fill="#0891B2" opacity="0.12"/>
  <!-- Hardhat -->
  <rect x="369" y="183" width="22" height="7" rx="3" fill="#F59E0B" opacity="0.35"/>
  
  <!-- Person 3 - center front -->
  <circle cx="250" cy="300" r="20" fill="#2563EB" opacity="0.2"/>
  <rect x="238" y="322" width="24" height="50" rx="7" fill="#2563EB" opacity="0.15"/>
  
  <!-- Connecting arcs (teamwork) -->
  <path d="M145 215 Q250 170 355 215" stroke="#2563EB" stroke-opacity="0.1" stroke-width="2" stroke-dasharray="6 4" fill="none"/>
  <path d="M155 260 Q250 320 345 260" stroke="#0891B2" stroke-opacity="0.1" stroke-width="2" stroke-dasharray="6 4" fill="none"/>
  
  <!-- Stats cards floating -->
  <!-- Card 1: Clock (24/7) -->
  <rect x="60" y="310" width="90" height="60" rx="10" fill="white" stroke="#2563EB" stroke-opacity="0.15" stroke-width="1.5"/>
  <circle cx="90" cy="332" r="10" stroke="#2563EB" stroke-opacity="0.3" stroke-width="1.5" fill="none"/>
  <line x1="90" y1="332" x2="90" y2="326" stroke="#2563EB" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="90" y1="332" x2="95" y2="335" stroke="#2563EB" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
  <text x="110" y="336" font-size="12" font-weight="700" fill="#2563EB" opacity="0.4">24/7</text>
  <text x="75" y="358" font-size="8" fill="#64748B" opacity="0.5">Support</text>
  
  <!-- Card 2: Map pin (ON & BC) -->
  <rect x="350" y="310" width="90" height="60" rx="10" fill="white" stroke="#0891B2" stroke-opacity="0.15" stroke-width="1.5"/>
  <path d="M380 335 C380 328 387 322 395 322 C403 322 410 328 410 335 C410 345 395 355 395 355 C395 355 380 345 380 335Z" fill="#0891B2" opacity="0.2"/>
  <circle cx="395" cy="334" r="3" fill="#0891B2" opacity="0.3"/>
  <text x="365" y="358" font-size="8" fill="#64748B" opacity="0.5">ON &amp; BC</text>
  
  <!-- Card 3: Star (8+ years) -->
  <rect x="175" y="390" width="100" height="50" rx="10" fill="white" stroke="#F59E0B" stroke-opacity="0.15" stroke-width="1.5"/>
  <polygon points="205,400 208,410 218,410 210,416 213,426 205,420 197,426 200,416 192,410 202,410" fill="#F59E0B" opacity="0.3"/>
  <text x="225" y="417" font-size="12" font-weight="700" fill="#F59E0B" opacity="0.5">8+ yrs</text>
  
  <!-- Wrench (expertise) -->
  <g transform="translate(80, 120) rotate(-30)" opacity="0.15">
    <rect x="0" y="8" width="40" height="6" rx="3" fill="#64748B"/>
    <circle cx="45" cy="11" r="10" stroke="#64748B" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Gears (operations) -->
  <circle cx="420" cy="130" r="18" stroke="#2563EB" stroke-opacity="0.12" stroke-width="2.5" fill="none" stroke-dasharray="8 4"/>
  <circle cx="442" cy="148" r="12" stroke="#0891B2" stroke-opacity="0.12" stroke-width="2" fill="none" stroke-dasharray="6 3"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="3" fill="#2563EB" opacity="0.15"/>
  <circle cx="430" cy="90" r="4" fill="#0891B2" opacity="0.12"/>
  <circle cx="300" cy="80" r="2.5" fill="#F59E0B" opacity="0.2"/>
  <rect x="150" y="110" width="15" height="15" rx="3" stroke="#2563EB" stroke-opacity="0.1" stroke-width="1.5" fill="none" transform="rotate(15 157 117)"/>
</svg>
