<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <!-- Workers & Logistics Illustration -->
  <!-- Background shapes -->
  <circle cx="300" cy="250" r="200" fill="#2563EB" opacity="0.04"/>
  <circle cx="300" cy="250" r="150" fill="#0891B2" opacity="0.05"/>
  
  <!-- Truck body -->
  <rect x="80" y="260" width="220" height="100" rx="8" fill="#2563EB" opacity="0.15"/>
  <rect x="90" y="270" width="120" height="60" rx="4" fill="#2563EB" opacity="0.25"/>
  <rect x="220" y="240" width="90" height="120" rx="8" fill="#2563EB" opacity="0.2"/>
  <!-- Truck windshield -->
  <rect x="230" y="250" width="70" height="50" rx="4" fill="#0891B2" opacity="0.3"/>
  <!-- Wheels -->
  <circle cx="140" cy="370" r="22" fill="#0F172A" opacity="0.2"/>
  <circle cx="140" cy="370" r="12" fill="#0F172A" opacity="0.1"/>
  <circle cx="270" cy="370" r="22" fill="#0F172A" opacity="0.2"/>
  <circle cx="270" cy="370" r="12" fill="#0F172A" opacity="0.1"/>
  
  <!-- Warehouse building -->
  <rect x="360" y="180" width="180" height="190" rx="6" fill="#2563EB" opacity="0.1"/>
  <rect x="370" y="170" width="160" height="10" rx="2" fill="#2563EB" opacity="0.2"/>
  <!-- Warehouse door -->
  <rect x="410" y="290" width="80" height="80" rx="4" fill="#2563EB" opacity="0.15"/>
  <rect x="420" y="300" width="25" height="70" rx="2" fill="#0891B2" opacity="0.2"/>
  <rect x="455" y="300" width="25" height="70" rx="2" fill="#0891B2" opacity="0.2"/>
  <!-- Warehouse windows -->
  <rect x="380" y="200" width="30" height="30" rx="3" fill="#0891B2" opacity="0.2"/>
  <rect x="425" y="200" width="30" height="30" rx="3" fill="#0891B2" opacity="0.2"/>
  <rect x="470" y="200" width="30" height="30" rx="3" fill="#0891B2" opacity="0.2"/>
  
  <!-- Worker figure 1 (standing with hardhat) -->
  <circle cx="170" cy="170" r="18" fill="#2563EB" opacity="0.25"/>
  <rect x="163" y="155" width="14" height="6" rx="2" fill="#F59E0B" opacity="0.4"/>
  <rect x="158" y="190" width="24" height="50" rx="6" fill="#2563EB" opacity="0.2"/>
  <rect x="158" y="238" width="10" height="30" rx="3" fill="#0F172A" opacity="0.15"/>
  <rect x="174" y="238" width="10" height="30" rx="3" fill="#0F172A" opacity="0.15"/>
  
  <!-- Worker figure 2 (with clipboard) -->
  <circle cx="350" cy="130" r="16" fill="#0891B2" opacity="0.25"/>
  <rect x="343" y="115" width="14" height="6" rx="2" fill="#F59E0B" opacity="0.4"/>
  <rect x="338" y="148" width="24" height="45" rx="6" fill="#0891B2" opacity="0.2"/>
  <!-- Clipboard -->
  <rect x="365" y="155" width="18" height="25" rx="2" fill="#F59E0B" opacity="0.3"/>
  <line x1="369" y1="163" x2="379" y2="163" stroke="#F59E0B" opacity="0.5" stroke-width="2"/>
  <line x1="369" y1="169" x2="379" y2="169" stroke="#F59E0B" opacity="0.5" stroke-width="2"/>
  <line x1="369" y1="175" x2="375" y2="175" stroke="#F59E0B" opacity="0.5" stroke-width="2"/>
  
  <!-- Worker figure 3 (forklift operator area) -->
  <circle cx="470" cy="110" r="14" fill="#2563EB" opacity="0.2"/>
  <rect x="464" y="126" width="20" height="40" rx="5" fill="#2563EB" opacity="0.15"/>
  
  <!-- Forklift -->
  <rect x="440" y="140" width="60" height="30" rx="4" fill="#F59E0B" opacity="0.2"/>
  <rect x="430" y="130" width="10" height="50" rx="2" fill="#F59E0B" opacity="0.25"/>
  <rect x="420" y="155" width="20" height="4" rx="1" fill="#F59E0B" opacity="0.3"/>
  <rect x="420" y="145" width="20" height="4" rx="1" fill="#F59E0B" opacity="0.3"/>
  <circle cx="455" cy="175" r="8" fill="#0F172A" opacity="0.15"/>
  <circle cx="485" cy="175" r="8" fill="#0F172A" opacity="0.15"/>
  
  <!-- Boxes/cargo -->
  <rect x="100" y="220" width="35" height="35" rx="3" fill="#F59E0B" opacity="0.2"/>
  <rect x="120" y="200" width="30" height="30" rx="3" fill="#0891B2" opacity="0.15"/>
  <rect x="480" y="250" width="28" height="28" rx="3" fill="#F59E0B" opacity="0.2"/>
  <rect x="510" y="240" width="32" height="32" rx="3" fill="#2563EB" opacity="0.15"/>
  <rect x="495" y="220" width="25" height="25" rx="3" fill="#0891B2" opacity="0.15"/>
  
  <!-- Connection lines (representing network/logistics) -->
  <line x1="200" y1="180" x2="330" y2="140" stroke="#2563EB" opacity="0.1" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="370" y1="140" x2="460" y2="120" stroke="#0891B2" opacity="0.1" stroke-width="2" stroke-dasharray="6 4"/>
  
  <!-- Road/ground line -->
  <line x1="50" y1="395" x2="550" y2="395" stroke="#2563EB" opacity="0.1" stroke-width="3"/>
  <line x1="60" y1="402" x2="540" y2="402" stroke="#2563EB" opacity="0.05" stroke-width="2"/>
  
  <!-- Decorative dots -->
  <circle cx="130" cy="120" r="3" fill="#2563EB" opacity="0.2"/>
  <circle cx="520" cy="150" r="3" fill="#0891B2" opacity="0.2"/>
  <circle cx="250" cy="100" r="2" fill="#F59E0B" opacity="0.25"/>
  <circle cx="400" cy="100" r="2" fill="#2563EB" opacity="0.15"/>
</svg>
