<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" fill="none">
  <!-- Modern flat illustration: Workers & Logistics — thin lines, airy -->

  <!-- Soft background circle -->
  <circle cx="260" cy="220" r="190" fill="#2563EB" opacity="0.025"/>

  <!-- ── Truck (simplified, thin) ── -->
  <rect x="60" y="250" width="180" height="75" rx="6" stroke="#2563EB" stroke-width="1.5" opacity="0.35" fill="none"/>
  <rect x="195" y="230" width="70" height="95" rx="8" stroke="#2563EB" stroke-width="1.5" opacity="0.35" fill="none"/>
  <!-- Windshield -->
  <rect x="203" y="242" width="54" height="36" rx="4" fill="#2563EB" opacity="0.06"/>
  <!-- Wheels -->
  <circle cx="120" cy="332" r="16" stroke="#0A1628" stroke-width="1.5" opacity="0.2" fill="none"/>
  <circle cx="120" cy="332" r="6" fill="#0A1628" opacity="0.06"/>
  <circle cx="232" cy="332" r="16" stroke="#0A1628" stroke-width="1.5" opacity="0.2" fill="none"/>
  <circle cx="232" cy="332" r="6" fill="#0A1628" opacity="0.06"/>

  <!-- ── Warehouse (clean rectangle) ── -->
  <rect x="320" y="170" width="150" height="158" rx="4" stroke="#0A1628" stroke-width="1.5" opacity="0.15" fill="none"/>
  <!-- Roof line -->
  <line x1="320" y1="192" x2="470" y2="192" stroke="#0A1628" stroke-width="1" opacity="0.1"/>
  <!-- Door -->
  <rect x="370" y="265" width="50" height="63" rx="3" stroke="#2563EB" stroke-width="1.2" opacity="0.2" fill="none"/>
  <!-- Windows row -->
  <rect x="335" y="205" width="22" height="22" rx="2" stroke="#2563EB" stroke-width="1" opacity="0.15" fill="none"/>
  <rect x="370" y="205" width="22" height="22" rx="2" stroke="#2563EB" stroke-width="1" opacity="0.15" fill="none"/>
  <rect x="405" y="205" width="22" height="22" rx="2" stroke="#2563EB" stroke-width="1" opacity="0.15" fill="none"/>
  <rect x="440" y="205" width="22" height="22" rx="2" stroke="#2563EB" stroke-width="1" opacity="0.15" fill="none"/>

  <!-- ── Person 1 (by truck, hardhat) ── -->
  <circle cx="155" cy="185" r="12" stroke="#0A1628" stroke-width="1.2" opacity="0.2" fill="none"/>
  <line x1="155" y1="197" x2="155" y2="235" stroke="#0A1628" stroke-width="1.2" opacity="0.2" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="155" y1="210" x2="140" y2="222" stroke="#0A1628" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
  <line x1="155" y1="210" x2="170" y2="222" stroke="#0A1628" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="155" y1="235" x2="145" y2="258" stroke="#0A1628" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
  <line x1="155" y1="235" x2="165" y2="258" stroke="#0A1628" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
  <!-- Hardhat -->
  <rect x="146" y="174" width="18" height="5" rx="2.5" fill="#F59E0B" opacity="0.35"/>

  <!-- ── Person 2 (by warehouse, clipboard) ── -->
  <circle cx="305" cy="135" r="11" stroke="#0A1628" stroke-width="1.2" opacity="0.2" fill="none"/>
  <line x1="305" y1="146" x2="305" y2="180" stroke="#0A1628" stroke-width="1.2" opacity="0.2" stroke-linecap="round"/>
  <line x1="305" y1="158" x2="290" y2="170" stroke="#0A1628" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
  <line x1="305" y1="158" x2="320" y2="168" stroke="#0A1628" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
  <line x1="305" y1="180" x2="296" y2="202" stroke="#0A1628" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
  <line x1="305" y1="180" x2="314" y2="202" stroke="#0A1628" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
  <!-- Clipboard -->
  <rect x="320" y="155" width="14" height="19" rx="2" stroke="#2563EB" stroke-width="1" opacity="0.25" fill="none"/>
  <line x1="324" y1="161" x2="330" y2="161" stroke="#2563EB" stroke-width="0.8" opacity="0.2"/>
  <line x1="324" y1="165" x2="330" y2="165" stroke="#2563EB" stroke-width="0.8" opacity="0.2"/>
  <line x1="324" y1="169" x2="328" y2="169" stroke="#2563EB" stroke-width="0.8" opacity="0.2"/>

  <!-- ── Cargo boxes (minimal) ── -->
  <rect x="85" y="226" width="22" height="22" rx="2" stroke="#F59E0B" stroke-width="1" opacity="0.2" fill="none"/>
  <rect x="96" y="214" width="18" height="18" rx="2" stroke="#0891B2" stroke-width="1" opacity="0.15" fill="none"/>

  <!-- ── Ground line ── -->
  <line x1="40" y1="350" x2="490" y2="350" stroke="#0A1628" stroke-width="1" opacity="0.06"/>

  <!-- ── Decorative dots (sparse) ── -->
  <circle cx="90" cy="140" r="2" fill="#2563EB" opacity="0.1"/>
  <circle cx="440" cy="130" r="2" fill="#2563EB" opacity="0.08"/>
  <circle cx="260" cy="100" r="1.5" fill="#0891B2" opacity="0.1"/>
</svg>
