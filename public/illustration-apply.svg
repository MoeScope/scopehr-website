<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" fill="none">
  <!-- Apply / Job Search Illustration (compact) -->
  <!-- Background -->
  <circle cx="150" cy="125" r="100" fill="#2563EB" opacity="0.04"/>
  
  <!-- Document/Resume -->
  <rect x="100" y="50" width="100" height="130" rx="8" fill="white" opacity="0.1" stroke="#2563EB" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Photo placeholder -->
  <circle cx="135" cy="85" r="15" fill="#2563EB" opacity="0.12"/>
  <!-- Text lines -->
  <rect x="160" y="75" width="28" height="4" rx="2" fill="#2563EB" opacity="0.15"/>
  <rect x="160" y="85" width="20" height="3" rx="1.5" fill="#0891B2" opacity="0.12"/>
  <rect x="115" y="112" width="70" height="3" rx="1.5" fill="#2563EB" opacity="0.1"/>
  <rect x="115" y="122" width="60" height="3" rx="1.5" fill="#2563EB" opacity="0.1"/>
  <rect x="115" y="132" width="65" height="3" rx="1.5" fill="#2563EB" opacity="0.1"/>
  <rect x="115" y="145" width="50" height="3" rx="1.5" fill="#0891B2" opacity="0.08"/>
  <rect x="115" y="155" width="55" height="3" rx="1.5" fill="#0891B2" opacity="0.08"/>
  
  <!-- Checkmark circle (approval) -->
  <circle cx="215" cy="80" r="20" fill="#2563EB" opacity="0.08" stroke="#2563EB" stroke-opacity="0.2" stroke-width="1.5"/>
  <path d="M205 80 L212 87 L225 72" stroke="#2563EB" stroke-opacity="0.35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Briefcase -->
  <rect x="55" y="120" width="30" height="22" rx="4" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="63" y="114" width="14" height="8" rx="3" fill="none" stroke="#F59E0B" stroke-opacity="0.2" stroke-width="1"/>
  
  <!-- Search/magnifier -->
  <circle cx="240" cy="160" r="14" stroke="#0891B2" stroke-opacity="0.2" stroke-width="2" fill="none"/>
  <line x1="250" y1="170" x2="260" y2="180" stroke="#0891B2" stroke-opacity="0.2" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Small decorative dots -->
  <circle cx="80" cy="70" r="2.5" fill="#2563EB" opacity="0.15"/>
  <circle cx="250" cy="50" r="2" fill="#0891B2" opacity="0.15"/>
  <circle cx="70" cy="180" r="2" fill="#F59E0B" opacity="0.2"/>
  <rect x="230" y="200" width="10" height="10" rx="2" stroke="#2563EB" stroke-opacity="0.1" stroke-width="1" fill="none" transform="rotate(15 235 205)"/>
</svg>
